name: localwave
description: Offline music player with Spotify-style UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Audio
  just_audio: ^0.9.42
  audio_service: ^0.18.17

  # Media
  on_audio_query: ^2.9.0

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Storage
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3

  # UI
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  palette_generator: ^0.3.3+4
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.4.0
  collection: ^1.18.0
  intl: ^0.19.0
  path_parsing: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/

# App Icon Configuration
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#121212"

# Splash Screen Configuration
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#121212"
  image: assets/splash/splash_logo.png
  color_dark: "#121212"
  image_dark: assets/splash/splash_logo.png
  android_12:
    color: "#121212"
    image: assets/splash/splash_logo.png
    color_dark: "#121212"
    image_dark: assets/splash/splash_logo.png
  android: true
  ios: true
  fullscreen: true
  screenshots:
    - image: assets/splash/splash_logo.png
      platforms:
        - android:
            dpi: xxxhdpi
            width: 432
            height: 432
        - ios:
            width: 200
            height: 200
